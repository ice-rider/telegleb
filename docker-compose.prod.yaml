services:
  redis:
    image: redis:7.2-alpine
    container_name: telegleb_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - telegleb_network
    command: redis-server --appendonly yes

  backend:
    image: ghcr.io/gleb/telegleb/backend:latest
    container_name: telegleb_backend
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - APP_ENV=production
      - LOG_LEVEL=debug
      - LOG_JSON=true

      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_TIMEOUT=5s

      - JWT_SECRET=CHANGE_ME

      - TG_APP_ID=CHANGE_ME
      - TG_APP_HASH=CHANGE_ME
    networks:
      - telegleb_network

  frontend:
    image: ghcr.io/gleb/telegleb/frontend:latest
    container_name: telegleb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - telegleb_network

  proxy:
    image: ghcr.io/gleb/telegleb/proxy:latest
    container_name: telegleb_proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    networks:
      - telegleb_network

volumes:
  redis_data:

networks:
  telegleb_network:
    driver: bridge
